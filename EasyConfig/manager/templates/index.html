{% load static %}
<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" type="text/css">
  <link rel="stylesheet" href="{% static 'css/theme.css' %}" type="text/css">
</head>

<body class="bg-info">
  <div class="py-5" style="">
    <div class="container">
      <div class="row">
        <div class="col-md-12 col-lg-12 w-100 h-75 bg-light" style="  border-radius: 20px;">
          <h1 class="text-center pt-5 mt-0">Welcome!&nbsp;<br>Please login to your account. </h1>
          
          <form class="my-0 p-2" method="POST" style="padding: 20px;">
            {% csrf_token %}
            
            <div class="form-group" style=""> 
              <input type="text" name="username" class="form-control text-center w-25 rounded border shadow-lg mx-1o form-control-lg rounded-pill bg-secondary mx-auto mt-4" placeholder="Username" required="required" style=" box-shadow: 0px 0px 50px  grey, 0px 0px 4px  black; border-style: rounded;background-color: #ebe7e6 !important;
      border: none !important;
      box-shadow: 6px 6px 0px #6c757d !important;
      transition: transform 0.2s;"> 
            </div>
            
            <div class="form-group"> 
              <input type="password" name="password" class="form-control text-center w-25 border rounded shadow-lg mx-auto form-control-lg rounded-pill bg-secondary" placeholder="Password" required="required" style="background-color: #ebe7e6 !important;
      border: none !important;
      box-shadow: 6px 6px 0px #6c757d !important;
      transition: transform 0.2s;">
            </div>
            
            <button type="submit" href="{% url 'project' proiect.project_id %}" class="btn btn-primary border rounded shadow-lg d-block w-auto rounded-pill btn-lg mx-auto mt-4 mb-2" style="background-color: #2c333a !important;
      border: none !important;
      color: white !important;
      box-shadow: 6px 6px 0px #6c757d !important;
      min-width: 160px;
      transition: all 0.2s;">Login</button>
      
            <a href="#" class="btn btn-primary border rounded d-block shadow-lg w-auto rounded-pill btn-lg mx-auto mt-1 text-center" style="background-color: #2c333a !important;
      border: none !important;
      color: white !important;
      box-shadow: 6px 6px 0px #6c757d !important;
      max-width: 160px;
      transition: all 0.2s; text-decoration: none; line-height: 23px;">Register</a>
          </form>
        </div>
      </div>
    </div>
  </div>
  <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js" crossorigin="anonymous" integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js" crossorigin="anonymous" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" style=""></script>
</body>

</html>
