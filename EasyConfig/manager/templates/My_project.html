{% load static %}
<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" type="text/css">
  <link rel="stylesheet" href="https://static.pingendo.com/bootstrap/bootstrap-4.3.1.css">
  <link rel="stylesheet" href="{% static 'css/theme.css' %}">
</head>
<body class="py-5" style="background-color: #A9A9A9; min-height: 100vh;">
  <div class="container">
    <div class="row">
      <div class="col-md-12" style="">
        <div class="bg-white p-5 w-100 h-100" style="	border-radius: 40px;	min-height: 500px;	  rgba(0 , 0 , 0 , 0.1), 0px 0px 4px  black, 0px 0px 4px  black, 0px 0px 4px  black, 0px 0px 4px  black;">
          <div class="d-flex justify-content-between align-items-center mb-4" style="border-bottom: 2px solid #000; padding-bottom: 10px;">
            <h2 class="m-0 font-weight-bold" style="font-size: 1.5rem;">My Projects</h2>
            <div class="d-flex align-items-center">
              <a href="#" class="btn btn-link text-dark d-flex align-items-center font-weight-bold" style="text-decoration: none;">
                <i class="fa fa-sign-out fa-lg mr-2"></i> {{request.user.name}} </a>
            </div>
          </div>
          <table class="table table-striped table-borderless">
            <tbody>
              {%for proiect in proiecte%}
              <tr style="">
                <th scope="row">{{proiect.name}}</th>
                <td>Status: {{proiect.status}}</td>
                <td class="text-right">
                  <a class="btn btn-primary" href="{% url 'projects' proiect.project_id %}" style="border-radius: 10px; width: 100px;"> Details </a>
                </td>
              </tr>
              {% empty %}
              <tr>
                <td colspan="3" class="text-center text-muted py-4">Nu s-au găsit proiecte în GNS3. Asigură-te că serverul GNS3 este pornit.</td>
              </tr>
              {% endfor %}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
